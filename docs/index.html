<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生学籍信息管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a1f36;
            --navy-light: #252b45;
            --navy-lighter: #2d3454;
            --gold: #c9a84c;
            --gold-light: #e2c97e;
            --gold-dim: rgba(201,168,76,0.12);
            --cream: #f8f6f0;
            --cream-dark: #eee9df;
            --text: #2c2c2c;
            --text-light: #6b6b6b;
            --text-muted: #9a9a9a;
            --white: #ffffff;
            --border: #e5e0d5;
            --success: #3d9970;
            --success-bg: #eaf6f0;
            --danger: #c0392b;
            --danger-bg: #fdecea;
            --info: #2e6da4;
            --info-bg: #e8f0fa;
            --warning: #d4850a;
            --warning-bg: #fef5e7;
            --radius: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--cream);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        ::selection { background: var(--gold); color: var(--navy); }

        .page { display: none; min-height: 100vh; }
        .page.active { display: flex; }

        /* ===== LOGIN PAGE ===== */
        .login-page {
            background: var(--navy);
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .login-bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image:
                radial-gradient(circle at 25% 25%, var(--gold) 1px, transparent 1px),
                radial-gradient(circle at 75% 75%, var(--gold) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .login-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
        }
        .login-glow-1 { background: var(--gold); top: -100px; left: -100px; }
        .login-glow-2 { background: #4a6fa5; bottom: -150px; right: -100px; }

        .login-card {
            position: relative;
            z-index: 2;
            width: 420px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            animation: loginFadeIn 0.8s ease-out;
        }

        @keyframes loginFadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-emblem {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-family: 'Crimson Pro', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--navy);
        }

        .login-card h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--white);
            text-align: center;
            margin-bottom: 4px;
        }

        .login-card .login-sub {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .login-hint {
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 24px;
            font-size: 12px;
            color: var(--gold-light);
            text-align: center;
        }

        .login-error {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 16px;
            font-size: 13px;
            min-height: 20px;
        }

        .login-field {
            margin-bottom: 18px;
        }
        .login-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .login-field input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 14px;
            color: var(--white);
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }
        .login-field input::placeholder { color: rgba(255,255,255,0.25); }
        .login-field input:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--navy);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(201,168,76,0.3);
        }
        .login-btn:active { transform: translateY(0); }

        /* ===== MAIN LAYOUT ===== */
        .main-page { flex-direction: column; }

        .topbar {
            background: var(--navy);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-brand .emblem-sm {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Crimson Pro', serif;
            font-size: 16px;
            font-weight: 900;
            color: var(--navy);
        }
        .topbar-brand span {
            font-family: 'Crimson Pro', serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.3px;
        }

        .topbar-nav {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .topbar-nav a {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: var(--transition);
            cursor: pointer;
        }
        .topbar-nav a:hover { color: var(--white); background: rgba(255,255,255,0.06); }
        .topbar-nav a.active { color: var(--gold-light); background: var(--gold-dim); }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .topbar-dao {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        .topbar-dao select {
            padding: 5px 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 12px;
            color: var(--gold-light);
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        .topbar-dao select option { background: var(--navy); color: var(--white); }

        .topbar-logout {
            color: rgba(255,255,255,0.4) !important;
            font-size: 12px !important;
            padding: 6px 12px !important;
        }
        .topbar-logout:hover { color: #e74c3c !important; background: rgba(231,76,60,0.1) !important; }

        .main-body {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 28px 32px;
        }

        /* ===== STATS BAR ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: var(--transition);
        }
        .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .stat-card .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .stat-card .stat-value {
            font-family: 'Crimson Pro', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .stat-card .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== CONTENT CARD ===== */
        .content-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            animation: fadeUp 0.5s ease-out 0.1s both;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .card-header h3 {
            font-family: 'Crimson Pro', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        .card-header .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 12px;
            transition: var(--transition);
        }
        .search-box:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }
        .search-box svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 10px;
            font-size: 13px;
            outline: none;
            width: 160px;
            font-family: inherit;
            color: var(--text);
        }
        .search-box input::placeholder { color: var(--text-muted); }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--navy);
        }
        .btn-gold:hover { box-shadow: 0 4px 12px rgba(201,168,76,0.3); transform: translateY(-1px); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

        .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
        .btn-view { background: var(--info-bg); color: var(--info); }
        .btn-view:hover { background: var(--info); color: var(--white); }
        .btn-edit { background: var(--warning-bg); color: var(--warning); }
        .btn-edit:hover { background: var(--warning); color: var(--white); }
        .btn-del { background: var(--danger-bg); color: var(--danger); }
        .btn-del:hover { background: var(--danger); color: var(--white); }

        /* ===== TABLE ===== */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            padding: 12px 20px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: var(--cream);
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 14px 20px;
            font-size: 14px;
            border-bottom: 1px solid #f0ece3;
            vertical-align: middle;
        }
        .data-table tbody tr {
            transition: var(--transition);
        }
        .data-table tbody tr:hover {
            background: rgba(201,168,76,0.04);
        }
        .data-table tbody tr:last-child td { border-bottom: none; }

        .td-actions { display: flex; gap: 6px; }

        .td-id {
            font-family: 'Crimson Pro', serif;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 15px;
        }
        .td-name {
            font-weight: 600;
            color: var(--text);
        }
        .td-age {
            color: var(--text-light);
        }
        .td-salary {
            font-family: 'Crimson Pro', serif;
            font-weight: 600;
            color: var(--success);
        }

        .empty-row td {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ===== PAGINATION ===== */
        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }
        .pagination-info {
            font-size: 13px;
            color: var(--text-muted);
        }
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .page-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            background: var(--white);
            text-decoration: none;
        }
        .page-btn:hover { border-color: var(--gold); color: var(--gold); }
        .page-btn.active {
            background: var(--navy);
            color: var(--gold-light);
            border-color: var(--navy);
        }
        .page-btn.disabled {
            color: var(--border);
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ===== FORM VIEW ===== */
        .form-view {
            max-width: 520px;
            margin: 0 auto;
            animation: fadeUp 0.4s ease-out;
        }
        .form-view .content-card { overflow: visible; }

        .form-title {
            font-family: 'Crimson Pro', serif;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            padding: 24px 24px 0;
        }
        .form-body { padding: 24px; }

        .form-field {
            margin-bottom: 18px;
        }
        .form-field label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .form-field input, .form-field select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
            background: var(--white);
            color: var(--text);
        }
        .form-field input:focus, .form-field select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        .form-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 24px 24px;
        }

        /* ===== DETAIL VIEW ===== */
        .detail-view {
            max-width: 480px;
            margin: 0 auto;
            animation: fadeUp 0.4s ease-out;
        }
        .detail-title {
            font-family: 'Crimson Pro', serif;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            padding: 24px 24px 16px;
        }
        .detail-body { padding: 0 24px 24px; }
        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #f0ece3;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            width: 80px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-top: 2px;
        }
        .detail-value {
            flex: 1;
            font-size: 15px;
            color: var(--text);
            font-weight: 500;
        }
        .detail-actions {
            display: flex;
            justify-content: center;
            padding: 0 24px 24px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,31,54,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 380px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.25s ease-out;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--danger-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 22px;
        }
        .modal-box p {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 24px;
        }
        .modal-actions { display: flex; justify-content: center; gap: 12px; }
        .btn-cancel {
            background: var(--cream);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-cancel:hover { background: var(--cream-dark); }
        .btn-danger-solid {
            background: var(--danger);
            color: var(--white);
        }
        .btn-danger-solid:hover { background: #a93226; }

        /* ===== TOAST ===== */
        .toast {
            display: none;
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.35s ease-out;
        }
        .toast.success { background: var(--success); color: var(--white); }
        .toast.error { background: var(--danger); color: var(--white); }
        .toast.show { display: flex; align-items: center; gap: 8px; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== FOOTER ===== */
        .main-footer {
            text-align: center;
            padding: 20px 32px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 32px;
        }
        .main-footer a { color: var(--gold); text-decoration: none; }
        .main-footer a:hover { text-decoration: underline; }

        /* ===== GENERIC ===== */
        .generic-switch {
            display: flex;
            background: var(--cream);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }
        .generic-switch button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
        }
        .generic-switch button.active {
            background: var(--white);
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .main-body { padding: 20px 16px; }
            .topbar { padding: 0 16px; }
            .topbar-nav a { padding: 6px 10px; font-size: 12px; }
            .topbar-dao { display: none; }
        }
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 14px; }
            .stat-card .stat-value { font-size: 22px; }
            .topbar-brand span { display: none; }
            .topbar-nav { gap: 0; }
            .topbar-nav a { padding: 6px 8px; font-size: 11px; }
            .search-box input { width: 100px; }
            .card-header { flex-wrap: wrap; gap: 10px; }
            .pagination-bar { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon">⚠</div>
        <p id="confirmMsg">确定删除该记录吗？</p>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn btn-danger-solid" onclick="confirmAction()">确定删除</button>
        </div>
    </div>
</div>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" class="page login-page active">
    <div class="login-bg-pattern"></div>
    <div class="login-glow login-glow-1"></div>
    <div class="login-glow login-glow-2"></div>
    <div class="login-card">
        <div class="login-emblem">S</div>

<script>
var students = [

    {id:5, name:'钱七', age:23}, {id:6, name:'孙八', age:19},
    {id:7, name:'周九', age:21}, {id:8, name:'吴十', age:22},
    {id:9, name:'郑一', age:24}, {id:10, name:'冯二', age:20},
    {id:11, name:'陈三', age:22}, {id:12, name:'褚四', age:21}
];
var teachers = [
    {id:1, name:'刘老师', age:35, salary:8000}, {id:2, name:'陈老师', age:40, salary:9500},
    {id:3, name:'杨老师', age:38, salary:8800}, {id:4, name:'黄老师', age:45, salary:10200},
    {id:5, name:'林老师', age:33, salary:7500}, {id:6, name:'何老师', age:42, salary:9800},
    {id:7, name:'罗老师', age:36, salary:8200}
];
var nextSId = 13, nextTId = 8;
var sPage = 1, tPage = 1, gPage = 1, gEntity = 'student';
var PAGE_SIZE = 5;
var pendingAction = null;
var studentSearchKey = '', teacherSearchKey = '';

function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(function(){ t.className = 'toast'; }, 2500);
}
function closeModal() { document.getElementById('confirmModal').classList.remove('show'); pendingAction = null; }
function confirmAction() { if(pendingAction) pendingAction(); closeModal(); }
function showConfirm(msg, action) {
    document.getElementById('confirmMsg').textContent = msg;
    pendingAction = action;
    document.getElementById('confirmModal').classList.add('show');
}

function doLogin() {
    var u = document.getElementById('loginUser').value;
    var p = document.getElementById('loginPass').value;
    if (u === 'xcy' && p === 'ddd') {
        document.getElementById('loginPage').classList.remove('active');
        document.getElementById('mainPage').classList.add('active');
        showView('studentList');
    } else {
        document.getElementById('loginError').textContent = '用户名或密码错误';
    }
}
function doLogout() {
    document.getElementById('mainPage').classList.remove('active');
    document.getElementById('loginPage').classList.add('active');
    document.getElementById('loginError').textContent = '';
}

function switchDaoType() {
    var v = document.getElementById('daoType').value;
    var names = {memory:'内存存储', db:'数据库存储', dbReflect:'反射动态SQL', remote:'远程网络调用'};
    showToast('已切换到' + names[v] + '模式', 'success');
}

function updateStats() {
    document.getElementById('statStudentCount').textContent = students.length;
    document.getElementById('statTeacherCount').textContent = teachers.length;
    var avgAge = students.length ? (students.reduce(function(s,x){return s+x.age},0)/students.length).toFixed(1) : 0;
    document.getElementById('statAvgAge').textContent = avgAge;
    var avgSal = teachers.length ? (teachers.reduce(function(s,x){return s+x.salary},0)/teachers.length/1000).toFixed(1) : 0;
    document.getElementById('statAvgSalary').textContent = avgSal + 'K';
}

function showView(name) {
    var views = ['studentListView','teacherListView','genericListView','addStudentView','editStudentView','viewStudentView','addTeacherView','editTeacherView'];
    views.forEach(function(id){ document.getElementById(id).style.display = 'none'; });
    document.querySelectorAll('.topbar-nav a').forEach(function(a){ a.classList.remove('active'); });

    var viewMap = {
        studentList: 'studentListView',
        teacherList: 'teacherListView',
        genericList: 'genericListView',
        addStudent: 'addStudentView',
        editStudent: 'editStudentView',
        viewStudent: 'viewStudentView',
        addTeacher: 'addTeacherView',
        editTeacher: 'editTeacherView'
    };
    var navMap = {
        studentList: 'navStudent',
        teacherList: 'navTeacher',
        genericList: 'navGeneric'
    };

    document.getElementById(viewMap[name]).style.display = 'block';
    if (navMap[name]) document.getElementById(navMap[name]).classList.add('active');

    if (name === 'studentList') renderStudentTable();
    else if (name === 'teacherList') renderTeacherTable();
    else if (name === 'genericList') renderGenericTable();
    updateStats();
}

function onStudentSearch() {
    studentSearchKey = document.getElementById('studentSearch').value.trim().toLowerCase();
    sPage = 1;
    renderStudentTable();
}
function onTeacherSearch() {
    teacherSearchKey = document.getElementById('teacherSearch').value.trim().toLowerCase();
    tPage = 1;
    renderTeacherTable();
}

function getFilteredStudents() {
    if (!studentSearchKey) return students;
    return students.filter(function(s) {
        return s.name.toLowerCase().indexOf(studentSearchKey) !== -1 || String(s.id).indexOf(studentSearchKey) !== -1;
    });
}
function getFilteredTeachers() {
    if (!teacherSearchKey) return teachers;
    return teachers.filter(function(t) {
        return t.name.toLowerCase().indexOf(teacherSearchKey) !== -1 || String(t.id).indexOf(teacherSearchKey) !== -1;
    });
}

function renderStudentTable() {
    var data = getFilteredStudents();
    var tbody = document.getElementById('studentTableBody');
    var total = data.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (sPage > totalPages) sPage = totalPages;
    var start = (sPage - 1) * PAGE_SIZE;
    var pageData = data.slice(start, start + PAGE_SIZE);

    if (pageData.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">暂无学生数据</td></tr>';
    } else {
        tbody.innerHTML = pageData.map(function(s){
            return '<tr><td class="td-id">#' + s.id + '</td><td class="td-name">' + s.name + '</td><td class="td-age">' + s.age + '</td>'
                + '<td><div class="td-actions">'
                + '<button class="btn btn-sm btn-view" onclick="viewStudent('+s.id+')">查看</button>'
                + '<button class="btn btn-sm btn-edit" onclick="editStudent('+s.id+')">编辑</button>'
                + '<button class="btn btn-sm btn-del" onclick="deleteStudent('+s.id+')">删除</button>'
                + '</div></td></tr>';
        }).join('');
    }
    renderPagination('studentPagination', 'studentPageInfo', sPage, totalPages, total, start + 1, Math.min(start + PAGE_SIZE, total), function(p){ sPage = p; renderStudentTable(); });
}

function renderTeacherTable() {
    var data = getFilteredTeachers();
    var tbody = document.getElementById('teacherTableBody');
    var total = data.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (tPage > totalPages) tPage = totalPages;
    var start = (tPage - 1) * PAGE_SIZE;
    var pageData = data.slice(start, start + PAGE_SIZE);

    if (pageData.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">暂无教师数据</td></tr>';
    } else {
        tbody.innerHTML = pageData.map(function(t){
            return '<tr><td class="td-id">#' + t.id + '</td><td class="td-name">' + t.name + '</td><td class="td-age">' + t.age + '</td><td class="td-salary">¥' + t.salary.toLocaleString() + '</td>'
                + '<td><div class="td-actions">'
                + '<button class="btn btn-sm btn-edit" onclick="editTeacher('+t.id+')">编辑</button>'
                + '<button class="btn btn-sm btn-del" onclick="deleteTeacher('+t.id+')">删除</button>'
                + '</div></td></tr>';
        }).join('');
    }
    renderPagination('teacherPagination', 'teacherPageInfo', tPage, totalPages, total, start + 1, Math.min(start + PAGE_SIZE, total), function(p){ tPage = p; renderTeacherTable(); });
}

function renderGenericTable() {
    var data = gEntity === 'student' ? students : teachers;
    var cols = gEntity === 'student'
        ? [{label:'编号',field:'id',cls:'td-id'},{label:'姓名',field:'name',cls:'td-name'},{label:'年龄',field:'age',cls:'td-age'}]
        : [{label:'编号',field:'id',cls:'td-id'},{label:'姓名',field:'name',cls:'td-name'},{label:'年龄',field:'age',cls:'td-age'},{label:'薪资',field:'salary',cls:'td-salary'}];

    document.getElementById('genericThead').innerHTML = '<tr>' + cols.map(function(c){ return '<th>'+c.label+'</th>'; }).join('') + '</tr>';

    var total = data.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (gPage > totalPages) gPage = totalPages;
    var start = (gPage - 1) * PAGE_SIZE;
    var pageData = data.slice(start, start + PAGE_SIZE);

    if (pageData.length === 0) {
        document.getElementById('genericTbody').innerHTML = '<tr class="empty-row"><td colspan="'+cols.length+'">暂无数据</td></tr>';
    } else {
        document.getElementById('genericTbody').innerHTML = pageData.map(function(item){
            return '<tr>' + cols.map(function(c){
                var val = item[c.field];
                if (c.field === 'id') val = '#' + val;
                if (c.field === 'salary') val = '¥' + val.toLocaleString();
                return '<td class="'+c.cls+'">'+val+'</td>';
            }).join('') + '</tr>';
        }).join('');
    }
    renderPagination('genericPagination', 'genericPageInfo', gPage, totalPages, total, start + 1, Math.min(start + PAGE_SIZE, total), function(p){ gPage = p; renderGenericTable(); });
}

function renderPagination(ctrlId, infoId, current, totalPages, totalCount, rangeStart, rangeEnd, callback) {
    var ctrl = document.getElementById(ctrlId);
    var info = document.getElementById(infoId);
    info.textContent = '显示 ' + rangeStart + '-' + rangeEnd + ' 条，共 ' + totalCount + ' 条';

    var html = '';
    html += '<button class="page-btn' + (current <= 1 ? ' disabled' : '') + '" data-action="first">«</button>';
    html += '<button class="page-btn' + (current <= 1 ? ' disabled' : '') + '" data-action="prev">‹</button>';

    var startP = Math.max(1, current - 2);
    var endP = Math.min(totalPages, current + 2);
    if (startP > 1) html += '<button class="page-btn" data-page="1">1</button>';
    if (startP > 2) html += '<span style="padding:0 4px;color:var(--text-muted)">…</span>';
    for (var i = startP; i <= endP; i++) {
        html += '<button class="page-btn' + (i === current ? ' active' : '') + '" data-page="'+i+'">'+i+'</button>';
    }
    if (endP < totalPages - 1) html += '<span style="padding:0 4px;color:var(--text-muted)">…</span>';
    if (endP < totalPages) html += '<button class="page-btn" data-page="'+totalPages+'">'+totalPages+'</button>';

    html += '<button class="page-btn' + (current >= totalPages ? ' disabled' : '') + '" data-action="next">›</button>';
    html += '<button class="page-btn' + (current >= totalPages ? ' disabled' : '') + '" data-action="last">»</button>';

    ctrl.innerHTML = html;
    ctrl.querySelectorAll('.page-btn:not(.disabled)').forEach(function(btn){
        btn.addEventListener('click', function(){
            var action = btn.getAttribute('data-action');
            var page = btn.getAttribute('data-page');
            if (action === 'first') callback(1);
            else if (action === 'prev') callback(current - 1);
            else if (action === 'next') callback(current + 1);
            else if (action === 'last') callback(totalPages);
            else if (page) callback(parseInt(page));
        });
    });
}

function switchGeneric(entity) {
    gEntity = entity;
    gPage = 1;
    document.getElementById('genericBtnStudent').classList.toggle('active', entity === 'student');
    document.getElementById('genericBtnTeacher').classList.toggle('active', entity === 'teacher');
    renderGenericTable();
}

function saveStudent() {
    var name = document.getElementById('addSName').value.trim();
    var age = parseInt(document.getElementById('addSAge').value);
    if (!name) { showToast('请输入姓名', 'error'); return; }
    if (isNaN(age) || age < 1) { showToast('请输入有效年龄', 'error'); return; }
    students.push({id: nextSId++, name: name, age: age});
    showToast('新增学生成功', 'success');
    document.getElementById('addSName').value = '';
    document.getElementById('addSAge').value = '';
    showView('studentList');
}

function editStudent(id) {
    var s = students.find(function(x){ return x.id === id; });
    if (!s) return;
    showView('editStudent');
    document.getElementById('editSId').value = s.id;
    document.getElementById('editSName').value = s.name;
    document.getElementById('editSAge').value = s.age;
}

function updateStudent() {
    var id = parseInt(document.getElementById('editSId').value);
    var name = document.getElementById('editSName').value.trim();
    var age = parseInt(document.getElementById('editSAge').value);
    if (!name) { showToast('请输入姓名', 'error'); return; }
    var s = students.find(function(x){ return x.id === id; });
    if (s) { s.name = name; s.age = age; }
    showToast('修改学生成功', 'success');
    showView('studentList');
}

function viewStudent(id) {
    var s = students.find(function(x){ return x.id === id; });
    if (!s) return;
    showView('viewStudent');
    document.getElementById('viewSId').textContent = '#' + s.id;
    document.getElementById('viewSName').textContent = s.name;
    document.getElementById('viewSAge').textContent = s.age;
}

function deleteStudent(id) {
    var s = students.find(function(x){ return x.id === id; });
    showConfirm('确定删除学生「' + (s ? s.name : '') + '」吗？此操作不可撤销。', function(){
        students = students.filter(function(x){ return x.id !== id; });
        showToast('删除学生成功', 'success');
        renderStudentTable();
        updateStats();
    });
}

function saveTeacher() {
    var name = document.getElementById('addTName').value.trim();
    var age = parseInt(document.getElementById('addTAge').value);
    var salary = parseFloat(document.getElementById('addTSalary').value);
    if (!name) { showToast('请输入姓名', 'error'); return; }
    if (isNaN(age) || age < 1) { showToast('请输入有效年龄', 'error'); return; }
    if (isNaN(salary) || salary < 0) { showToast('请输入有效薪资', 'error'); return; }
    teachers.push({id: nextTId++, name: name, age: age, salary: salary});
    showToast('新增教师成功', 'success');
    document.getElementById('addTName').value = '';
    document.getElementById('addTAge').value = '';
    document.getElementById('addTSalary').value = '';
    showView('teacherList');
}

function editTeacher(id) {
    var t = teachers.find(function(x){ return x.id === id; });
    if (!t) return;
    showView('editTeacher');
    document.getElementById('editTId').value = t.id;
    document.getElementById('editTName').value = t.name;
    document.getElementById('editTAge').value = t.age;
    document.getElementById('editTSalary').value = t.salary;
}

function updateTeacher() {
    var id = parseInt(document.getElementById('editTId').value);
    var name = document.getElementById('editTName').value.trim();
    var age = parseInt(document.getElementById('editTAge').value);
    var salary = parseFloat(document.getElementById('editTSalary').value);
    if (!name) { showToast('请输入姓名', 'error'); return; }
    var t = teachers.find(function(x){ return x.id === id; });
    if (t) { t.name = name; t.age = age; t.salary = salary; }
    showToast('修改教师成功', 'success');
    showView('teacherList');
}

function deleteTeacher(id) {
    var t = teachers.find(function(x){ return x.id === id; });
    showConfirm('确定删除教师「' + (t ? t.name : '') + '」吗？此操作不可撤销。', function(){
        teachers = teachers.filter(function(x){ return x.id !== id; });
        showToast('删除教师成功', 'success');
        renderTeacherTable();
        updateStats();
    });
}

document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>
